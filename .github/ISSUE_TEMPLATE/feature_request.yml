name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE REQUEST] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "🚀 Thank you for suggesting a new feature! Please fill out the following form to help us understand your proposal."

  - type: input
    attributes:
      label: Feature Summary
      description: "Please provide a brief summary of the feature you are proposing."
      placeholder: "A concise summary of the feature..."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Feature Description
      description: "Please provide a detailed description of the feature. Include any specific requirements or functionality you envision."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Problem and Context
      description: "Explain the problem that this feature would address and the context in which it would be useful."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Potential Benefits
      description: "What benefits do you believe this feature would provide? How would it enhance the project?"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Possible Drawbacks
      description: "Are there any potential drawbacks or downsides to implementing this feature?"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Alternatives Considered
      description: "Have you considered any alternative solutions or features? If so, please describe them."
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: I have searched the existing issues
      description: "Before submitting this feature request, I confirm that I have searched the existing issues and did not find a similar request."
      options:
        - label: "Yes, I have searched existing issues."
    validations:
      required: true
